[binance_user_config]
# API keys loaded from environment variables (API_KEY, API_SECRET_KEY)
api_key=
api_secret_key=

# Starting coin - set to TIA (currently held position on Binance)
current_coin=TIA

# Use testnet for paper trading
testnet=false

# Bridge currency - USDC as requested
bridge=USDC

# Binance TLD
tld=com

# Scout settings
hourToKeepScoutHistory=1
use_margin=no
scout_multiplier=6
scout_margin=0.8
scout_sleep_time=1

# Strategy — MOMENTUM ROTATION (backtest-optimized, +79% over 6 months)
strategy=momentum

# ── Momentum Strategy Settings ─────────────────────────────────────────────
# Lookback window for performance measurement (hours)
momentum_lookback_hours=18
# Minimum outperformance edge to trigger trade (%)
momentum_min_edge=8.0
# Cooldown between trades: 2 hours
trade_cooldown_seconds=7200
# Anti-churn: 24 hours (don't re-buy recently held coins)
churn_block_seconds=86400
# Confirmation delay: require N consecutive scout cycles confirming the same rotation signal
confirmation_cycles=3
# Time-based confirmation: require signals to persist for minimum seconds before trading
# CRITICAL FIX: Previously disabled, bot was trading on 3-second noise (SCOUT_SLEEP_TIME=1 x 3 cycles)
# This caused 18 trades in 30h instead of expected ~0.25/day. Now require minutes of persistence.
confirmation_time_enabled=yes
confirmation_min_seconds=180
bull_confirmation_min_seconds=300
sideways_confirmation_min_seconds=180
bear_confirmation_min_seconds=60
# Trailing stop: 15% from peak
trailing_stop_enabled=yes
trailing_stop_pct=15.0

# Order timeouts (minutes, 0 = never cancel)
buy_timeout=20
sell_timeout=20

# ── Improved Strategy Settings ─────────────────────────────────────────────
# Phase 2: Rolling ratio baseline
ratio_sample_interval=10
ratio_sample_retention_days=7

# Phase 3: Z-score threshold (trade when z-score exceeds this)
z_score_threshold=1.5

# Phase 4: Momentum filter (skip coins crashing > this % in 1h)
momentum_filter_enabled=yes
momentum_max_drop_1h=5.0

# Phase 5: Market regime detection
regime_check_enabled=yes
regime_high_vol_threshold=8.0
regime_z_score_multiplier=2.0
# Require repeated classifier readings before live regime/capital moves
regime_confirmation_cycles=3

# Phase 6: Trade cooldown (seconds between trades) + USDC profit-taking
# trade_cooldown_seconds=1800 (overridden by momentum config)
profit_taking_enabled=no
profit_taking_interval=999

# ── ROI Optimization ──────────────────────────────────────────────────────
# Minimum profit threshold (decimal) — don't trade unless edge > this
# 0.015 = 1.5% minimum expected gain (well above 0.15% fee cost)
min_profit_threshold=0.015

# Anti-churn: don't re-buy a coin held within this many seconds
# 21600 = 6 hours (prevents TIA→ENA→TIA cycling)
# churn_block_seconds=21600 (overridden by momentum)

# RSI filter: skip buying overbought coins
rsi_filter_enabled=yes
rsi_overbought=68

# ── Bear Mode Settings (current market) ───────────────────────────────────
# Bear cooldown: 2 hours between trades (was 30 min — caused churning)
bear_cooldown=7200
# Bear profit-taking: disabled (just generates fees at this balance)
bear_profit_take_interval=999
# Bear z-score multiplier: very selective
bear_zscore_mult=2.5

# ── ROI Maximization Features ─────────────────────────────────────────────
# Feature 1: Maker orders (0.025% fee vs 0.075% taker = 67% savings)
use_maker_orders=yes

# Feature 2: BTC correlation for regime detection
btc_correlation_enabled=yes

# Feature 3: Dynamic position sizing (keep dry powder in bear/sideways)
dynamic_position_enabled=yes
bear_position_size=0.7
sideways_position_size=0.9

# Feature 4: Correlation-based coin selection (avoid correlated pairs)
correlation_filter_enabled=yes
correlation_threshold=0.85

# Feature 5: Bollinger Band squeeze detection (catch breakouts)
bb_squeeze_enabled=yes
bb_period=20
bb_squeeze_lookback=50

# ── Production Hardening ──────────────────────────────────────────────────
# Maker reprice: reprice to taker after this many minutes if unfilled (0=off)
maker_reprice_timeout=5

# Indicator cache TTL (seconds) — cache RSI/correlation/BB between scout cycles
indicator_cache_ttl=300

# Spread detection: use midpoint pricing when spread > threshold*2
spread_detection_enabled=yes
wide_spread_threshold=0.15

# ── USDC-M Futures (Bear Regime) ───────────────────────────────────────────
# Short worst-performing coins during bear market using USDC-M perpetuals
# SAFETY: 1x leverage, CROSS margin on this account (Binance rejects ISOLATED), stop-loss + trailing stop
futures_leverage=1
futures_max_margin_pct=0.5
futures_margin_type=CROSS
futures_stop_loss_pct=15.0
futures_trailing_stop_pct=10.0
futures_max_funding_rate=0.0001
futures_check_interval=60

# ── Canary Capital Guard (real-money rollout caps) ─────────────────────────
# Canary mode ENABLED on live deployment with capped capital amounts
# Canary mode: OFF in git repo (safe defaults). Enable in live deployment config.
canary_mode_enabled=no
canary_max_spot_trade_usdc=0
canary_futures_max_margin_pct=0
canary_max_futures_margin_usdc=0

# ── Portfolio Circuit Breaker (catastrophic loss protection) ───────────────
# TIGHTENED: daily 3.0% (was 5.0), weekly 8.0% (was 12.0)
# Portfolio circuit breaker: OFF in git repo (safe defaults). ENABLED on live deployment.
portfolio_circuit_breaker_enabled=no
portfolio_daily_max_drawdown_pct=3.0
portfolio_weekly_max_drawdown_pct=8.0
portfolio_circuit_breaker_cooldown_hours=24
