[binance_user_config]
# API keys loaded from environment variables (API_KEY, API_SECRET_KEY)
# Fill these in if you want to override:
api_key=
api_secret_key=

# Starting coin - set to TIA (currently held position on Binance)
current_coin=TIA

# Use testnet for paper trading
testnet=false

# Bridge currency - USDC as requested
bridge=USDC

# Binance TLD
tld=com

# Scout settings
hourToKeepScoutHistory=1
use_margin=no
scout_multiplier=6
scout_margin=0.8
scout_sleep_time=1

# Strategy
strategy=improved

# Order timeouts (minutes, 0 = never cancel)
buy_timeout=20
sell_timeout=20

# ── Improved Strategy Settings ─────────────────────────────────────────────
# Phase 2: Rolling ratio baseline
ratio_sample_interval=10
ratio_sample_retention_days=7

# Phase 3: Z-score threshold (trade when z-score exceeds this)
z_score_threshold=1.5

# Phase 4: Momentum filter (skip coins crashing > this % in 1h)
momentum_filter_enabled=yes
momentum_max_drop_1h=5.0

# Phase 5: Market regime detection
regime_check_enabled=yes
regime_high_vol_threshold=8.0
regime_z_score_multiplier=2.0

# Phase 6: Trade cooldown (seconds between trades) + USDC profit-taking
trade_cooldown_seconds=1800
profit_taking_enabled=no
profit_taking_interval=999

# ── ROI Optimization ──────────────────────────────────────────────────────
# Minimum profit threshold (decimal) — don't trade unless edge > this
# 0.015 = 1.5% minimum expected gain (well above 0.15% fee cost)
min_profit_threshold=0.015

# Anti-churn: don't re-buy a coin held within this many seconds
# 21600 = 6 hours (prevents TIA→ENA→TIA cycling)
churn_block_seconds=21600

# RSI filter: skip buying overbought coins
rsi_filter_enabled=yes
rsi_overbought=68

# ── Bear Mode Settings (current market) ───────────────────────────────────
# Bear cooldown: 2 hours between trades (was 30 min — caused churning)
bear_cooldown=7200
# Bear profit-taking: disabled (just generates fees at this balance)
bear_profit_take_interval=999
# Bear z-score multiplier: very selective
bear_zscore_mult=2.5
