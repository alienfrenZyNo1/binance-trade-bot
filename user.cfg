[binance_user_config]
# API keys loaded from environment variables (API_KEY, API_SECRET_KEY)
# Fill these in if you want to override:
api_key=
api_secret_key=

# Starting coin - set to AAVE (currently held position from previous run)
current_coin=AAVE

# Use testnet for paper trading
testnet=false

# Bridge currency - USDC as requested
bridge=USDC

# Binance TLD
tld=com

# Scout settings
hourToKeepScoutHistory=1
use_margin=no
scout_multiplier=3
scout_margin=0.8
scout_sleep_time=1

# Strategy
strategy=default

# Order timeouts (minutes, 0 = never cancel)
buy_timeout=20
sell_timeout=20
